buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // Gradle 9.x ile çalışan güncel Android Plugin
        classpath 'com.android.tools.build:gradle:8.2.0'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}
apply plugin: 'com.android.application'

android {
    namespace 'com.filipebarretto.androidhelloworld'
    compileSdk 34 // En güncel hedef

    defaultConfig {
        applicationId "com.filipebarretto.androidhelloworld"
        minSdkVersion 16
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
