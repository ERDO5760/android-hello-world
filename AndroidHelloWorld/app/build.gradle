apply plugin: 'com.android.application'

android {
    // Sürüm numarasını sabit 30'da tutuyoruz, çünkü 30 GitHub'da standarttır
    compileSdkVersion 30

    defaultConfig {
        applicationId "com.filipebarretto.androidhelloworld"
        minSdkVersion 16
        targetSdkVersion 30
        versionCode 2
        versionName "1.0.1"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    // compile yerine implementation kullanıyoruz (Gradle sürümün destekliyorsa)
    // Eğer hata alırsan 'compile' olarak değiştirebilirsin
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    testImplementation 'junit:junit:4.12'
    implementation 'com.android.support:appcompat-v7:28.0.0'
}
